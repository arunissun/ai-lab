      model: openai/z-ai/glm-4.5-air:free
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: OR-trinity-mini ⭐⭐        # Arcee 26B MoE — fast tool calling, multi-step agents, 131K ctx
