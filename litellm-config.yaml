      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: OR-glm-4.5-air ⭐⭐         # Z.ai GLM 4.5 Air MoE — thinking mode + tool use, 131K ctx
