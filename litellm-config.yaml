      model: openai/arcee-ai/trinity-mini:free
      api_base: https://openrouter.ai/api/v1
      api_key: os.environ/OPENROUTER_API_KEY

  - model_name: OR-nemotron-nano-30b ⭐⭐   # NVIDIA 30B MoE — agentic AI, 256K ctx
